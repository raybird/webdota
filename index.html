<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web MOBA - Mythic Legends</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        #app {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* UI on top of canvas */
            pointer-events: none; /* Let clicks pass through to canvas by default */
        }
        /* Re-enable pointer events for UI elements */
        #app > * {
            pointer-events: auto;
        }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
